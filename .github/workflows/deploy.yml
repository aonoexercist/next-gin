name: CI/CD Next app

on:
  push:
    branches: [ dev, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
    
    - name: Install dependencies
      run: bun install

    - name: Lint
      run: bun run lint

    - name: Test
      run: bun run test

    - name: Build
      run: bun run build
  
